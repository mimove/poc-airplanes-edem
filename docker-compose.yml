version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: aerodrome
      POSTGRES_PASSWORD: aerodrome
      POSTGRES_DB: aerodrome
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerodrome"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://aerodrome:aerodrome@db:5432/aerodrome
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
